# Staging overlay: production build/behavior with staging credentials.
# Secrets come from .env.staging (never committed; SOPS/age-encrypted at rest
# per the delivery blueprint) — copy .env.staging.example to start.
#   docker compose --env-file .env.staging \
#     -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    restart: unless-stopped
    environment:
      NODE_ENV: production

  # One-shot first-run job (opt-in profile): creates the Central scope +
  # central admin after migrations. Run:
  #   docker compose --env-file .env.staging -f docker-compose.yml \
  #     -f docker-compose.staging.yml --profile bootstrap run --rm bootstrap
  bootstrap:
    image: rl-migrate:${TAG:-local}
    profiles: ["bootstrap"]
    command: ["pnpm", "run", "bootstrap"]
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rl}:${POSTGRES_PASSWORD:-rl_dev_password}@postgres:5432/${POSTGRES_DB:-resilient_learn}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-}
      BOOTSTRAP_ADMIN_PHONE: ${BOOTSTRAP_ADMIN_PHONE:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  verify:
    restart: unless-stopped
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
