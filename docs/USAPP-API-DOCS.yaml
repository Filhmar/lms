info:
  title: USAPp Integration API
  description: >-
    SaaS integration API for external applications to send messages through
    USAPp
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    api-key:
      type: apiKey
      in: header
      name: X-API-Key
    admin-jwt:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    AdminLoginDto:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
          example: superadmin
        password:
          type: string
      required:
        - username
        - password
    AdminLogoutDto:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    AdminRefreshTokenDto:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    AdminChangePasswordDto:
      type: object
      properties:
        passwordChangeToken:
          type: string
          description: Short-lived token returned when mustChangePassword is true
        newPassword:
          type: string
          minLength: 12
      required:
        - passwordChangeToken
        - newPassword
    CreateAdminDto:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
          example: admin_ops
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          minLength: 12
      required:
        - username
        - email
        - password
    CreateTenantDto:
      type: object
      properties:
        plan:
          enum:
            - INTERNAL
            - FREE
            - STARTER
            - BUSINESS
          type: string
          description: Plan tier — defaults to FREE if not specified
        ipAllowlist:
          minItems: 1
          example:
            - 192.168.1.0/24
            - 10.0.0.1
          description: Mandatory IP allowlist — at least one IPv4 address or CIDR
          type: array
          items:
            type: string
            pattern: ^(\d{1,3}\.){3}\d{1,3}(\/\d{1,2})?$
        name:
          type: string
          minLength: 2
          maxLength: 100
          pattern: ^[a-zA-Z0-9_\-\s]+$
        displayName:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 500
      required:
        - ipAllowlist
        - name
    UpdateTenantDto:
      type: object
      properties:
        ipAllowlist:
          minItems: 1
          example:
            - 192.168.1.0/24
            - 10.0.0.1
          description: IP allowlist — cannot be empty if provided
          type: array
          items:
            type: string
            pattern: ^(\d{1,3}\.){3}\d{1,3}(\/\d{1,2})?$
        name:
          type: string
          minLength: 2
          maxLength: 100
          pattern: ^[a-zA-Z0-9_\-\s]+$
        displayName:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 500
        isActive:
          type: boolean
        webhookUrl:
          type: string
        webhookSecret:
          type: string
          minLength: 32
    UpdateTenantPlanDto:
      type: object
      properties:
        plan:
          enum:
            - INTERNAL
            - FREE
            - STARTER
            - BUSINESS
          type: string
          description: Target plan tier
      required:
        - plan
    ReassignTenantOwnerDto:
      type: object
      properties:
        adminId:
          type: string
      required:
        - adminId
    CreateApiKeyDto:
      type: object
      properties:
        scopes:
          type: array
          items:
            type: string
            enum:
              - messages:send
              - messages:read
              - templates:manage
              - usage:read
              - batch:send
          description: Permission scopes — omit for unrestricted access
        label:
          type: string
          maxLength: 200
        expiresAt:
          type: string
    CreateTemplateDto:
      type: object
      properties:
        format:
          enum:
            - plain
            - markdown
          type: string
          default: plain
          description: >-
            Rich-text format. 'markdown' enables a safe bold-only subset;
            absent/'plain' = unchanged plain text.
        name:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
          maxLength: 7000
      required:
        - name
        - body
    SetWebhookDto:
      type: object
      properties:
        webhookUrl:
          type: string
          format: uri
          description: URL to deliver webhook events to
        webhookSecret:
          type: string
          minLength: 32
          description: Secret for HMAC-SHA256 signing — minimum 32 characters
      required:
        - webhookUrl
        - webhookSecret
    UpdateDsarDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - PENDING
            - ACKNOWLEDGED
            - IN_PROGRESS
            - COMPLETED
            - REJECTED
        notes:
          type: string
        extendedUntil:
          type: string
        extensionReason:
          type: string
    SendTenantMessageDto:
      type: object
      properties:
        variables:
          type: object
          additionalProperties:
            type: string
          example:
            name: John
            code: '1234'
          description: >-
            Key-value pairs to substitute {{variable}} placeholders in the
            template
        format:
          enum:
            - plain
            - markdown
          type: string
          default: plain
          description: >-
            Rich-text format. 'markdown' enables a safe bold-only subset;
            absent/'plain' = unchanged plain text.
        recipientPhone:
          type: string
          pattern: ^\+63\d{10}$
        content:
          type: string
          minLength: 1
          maxLength: 7000
        templateId:
          type: string
          format: uuid
      required:
        - recipientPhone
    UpdateTemplateDto:
      type: object
      properties:
        format:
          enum:
            - plain
            - markdown
          type: string
          default: plain
          description: >-
            Rich-text format. 'markdown' enables a safe bold-only subset;
            absent/'plain' = unchanged plain text.
        name:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
          maxLength: 7000
    CreateBatchDto:
      type: object
      properties:
        recipients:
          minItems: 1
          maxItems: 500
          example:
            - '09123456789'
            - '09987654321'
          description: >-
            Philippine phone numbers of recipients (max 500) — supports formats:
            +639..., 09..., 9...
          type: array
          items:
            type: string
            pattern: ^\d{10,12}$
        variables:
          type: object
          additionalProperties:
            type: string
          example:
            name: John
            code: '1234'
          description: >-
            Key-value pairs to substitute {{variable}} placeholders in the
            template
        batchMessageId:
          type: string
          minLength: 1
          maxLength: 255
          description: >-
            Caller-supplied identifier echoed back in the BATCH_COMPLETED
            webhook payload — use this to correlate the webhook event with your
            original request
        format:
          enum:
            - plain
            - markdown
          type: string
          default: plain
          description: >-
            Rich-text format. 'markdown' enables a safe bold-only subset;
            absent/'plain' = unchanged plain text.
        content:
          type: string
          minLength: 1
          maxLength: 7000
        templateId:
          type: string
          format: uuid
      required:
        - recipients
        - batchMessageId