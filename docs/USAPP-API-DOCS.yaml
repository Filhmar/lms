      parameters:
        - name: id
          required: true
          in: path
          description: Template UUID
          schema:
            type: string
      responses:
        '200':
          description: Template deleted successfully
        '401':
          description: Missing or invalid API key
        '403':
          description: IP not in allowlist or missing `templates:manage` scope
        '404':
          description: Template not found
        '429':
          description: Rate limit exceeded
      security:
        - api-key: []
      summary: Delete a message template
      tags:
        - Tenant
        - Templates
  /api/v1/messages/batch:
    post:
      description: Sends a message to up to 500 recipients in a single request.
      operationId: TenantController_createBatch
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
