global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Backend prom-client standalone server — scraped over the compose network
  # only; :9464 is never published to a host.
  - job_name: backend
    static_configs:
      - targets: ["backend:9464"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
